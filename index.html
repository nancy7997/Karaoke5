<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Karaoke Roulette</title>
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>
    <style>
        :root {
            --spotify-green: #1DB954;
            --spotify-black: #121212;
            --spotify-dark: #282828;
            --spotify-blue: #3498db;
            --text-main: #FFFFFF;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            text-align: center;
            background-color: var(--spotify-black);
            color: var(--text-main);
            margin: 0;
            padding: env(safe-area-inset-top) 10px 5px 10px;
            height: 100vh;
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }

        /* --- INTRO SEQUENCE --- */
        #intro-overlay {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: #000; z-index: 1000; display: flex; flex-direction: column;
            justify-content: center; align-items: center; transition: opacity 1s ease;
        }
        .intro-row {
            display: flex; white-space: nowrap; margin: 10px 0;
            transform: translateX(100%);
            animation: scrollIn 2s forwards cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }
        #row-2 { animation-delay: 0.5s; }
        .block-letter {
            font-size: 10vw; font-weight: 900; display: inline-block;
            margin: 0 2px; padding: 5px 10px;
            animation: bounceUpDown 0.6s infinite alternate ease-in-out;
        }
        #flash-categories {
            margin-top: 30px; font-size: 1.8em; font-weight: 900;
            color: var(--spotify-green); text-transform: uppercase;
            height: 1.5em; text-shadow: 0 0 10px rgba(29, 185, 84, 0.5);
        }
        @keyframes scrollIn { to { transform: translateX(0); } }
        @keyframes bounceUpDown { from { transform: translateY(0); } to { transform: translateY(-30px); } }

        /* --- GAME UI --- */
        #game-content { display: flex; flex-direction: column; height: 100%; display: none; }
        h1 { color: var(--spotify-green); font-size: 1.1em; margin: 5px 0 2px 0; }
        
        .score-board {
            display: flex; justify-content: space-around; background: var(--spotify-dark);
            padding: 8px; border-radius: 12px; margin-bottom: 5px; border: 1px solid #444;
        }
        .score-display { flex: 1; transition: all 0.3s; }
        .active-team { border-bottom: 3px solid var(--spotify-green); background: rgba(29, 185, 84, 0.1); border-radius: 8px 8px 0 0; }
        .score-num { font-size: 1.4em; color: var(--spotify-green); font-weight: 800; display: block;}

        .controls-row { display: flex; align-items: center; justify-content: center; gap: 15px; margin-bottom: 2px; }
        #timer { font-size: 42px; font-weight: 800; background: #333; padding: 8px 15px; border-radius: 12px; min-width: 140px; }
        
        #mode-display { 
            font-size: 1.6em; font-weight: 900; color: var(--spotify-blue); 
            margin: 10px 0 20px 0; min-height: 1.1em; text-transform: uppercase;
        }

        #wheel-area { flex-grow: 10; display: flex; justify-content: center; align-items: flex-start; position: relative; margin-top: 15px; }
        #wheel-container { position: relative; width: 85vw; height: 85vw; max-width: 380px; max-height: 380px; }
        canvas { width: 100%; height: 100%; border-radius: 50%; border: 4px solid white; transition: transform 4s cubic-bezier(0.1, 0.7, 0.2, 1); }
        .pointer { position: absolute; top: -10px; left: 50%; transform: translateX(-50%); width: 0; height: 0; border-left: 20px solid transparent; border-right: 20px solid transparent; border-top: 35px solid white; z-index: 100; }

        .btn-main { padding:15px 30px; border-radius:12px; border:none; font-weight:900; cursor: pointer; text-transform: uppercase; }
        
        /* Modal Styles */
        .modal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.96); z-index: 2000; flex-direction: column; justify-content: center; align-items: center; }
        .modal-content { background: var(--spotify-dark); padding: 25px; border-radius: 25px; width: 85%; border: 1px solid #444; display: flex; flex-direction: column; align-items: center;}
        .modal button { margin: 15px 0; width: 100%; padding: 20px; font-weight: bold; border-radius: 12px; border: none; font-size: 1.1em; cursor: pointer;}
        
        #mode-wheel-wrapper { position: relative; width: 300px; height: 300px; margin: 20px 0; }
        #mode-wheel-canvas { width: 100%; height: 100%; }
    </style>
</head>
<body>

    <div id="intro-overlay">
        <div id="row-1" class="intro-row"></div>
        <div id="row-2" class="intro-row"></div>
        <div id="flash-categories"></div>
    </div>

    <div id="game-content">
        <h1 id="current-team-banner">TEAM 1 TURN</h1>
        <div id="round-indicator" style="font-size: 0.8em; color: #888; margin-bottom: 2px;">Round 1 of 5</div>
        <div class="score-board">
            <div id="t1-box" class="score-display active-team"><span id="t1-name">T1</span><span id="s1" class="score-num">0</span></div>
            <div id="t2-box" class="score-display"><span id="t2-name">T2</span><span id="s2" class="score-num">0</span></div>
        </div>
        
        <div class="controls-row">
            <div id="timer">01:30</div>
            <button onclick="spinCategory()" id="spinBtn" class="btn-main" style="background:var(--spotify-green); color:white;">SPIN CATEGORY</button>
            <button onclick="earlyStop()" id="stopBtn" class="btn-main" style="background:#e74c3c; color:white; display:none;">STOP</button>
        </div>

        <div id="mode-display">SPIN TO START</div>

        <div id="wheel-area">
            <div id="wheel-container">
                <div class="pointer"></div>
                <canvas id="wheel-canvas" width="800" height="800"></canvas>
            </div>
        </div>
    </div>

    <div id="modeModal" class="modal">
        <div class="modal-content">
            <h2 style="color:white; margin:0;">SELECT MODE</h2>
            <div id="mode-wheel-wrapper">
                <div class="pointer" style="border-top-color: white;"></div>
                <canvas id="mode-wheel-canvas" width="600" height="600"></canvas>
            </div>
            <button id="modeSpinBtn" onclick="spinModeWheel()" style="background:var(--spotify-blue); color:white;">SPIN FOR MODE</button>
        </div>
    </div>

    <div id="spinScoreModal" class="modal">
        <div class="modal-content">
            <h2 style="color:white;">Did they sing?</h2>
            <button onclick="recordScore(100)" style="background:var(--spotify-green); color:white;">YES (100)</button>
            <button onclick="recordScore(25)" style="background:#f1c40f; color:black;">OTHER (25)</button>
            <button onclick="recordScore(0)" style="background:#e74c3c; color:white;">NO (0)</button>
        </div>
    </div>

    <div id="guessScoreModal" class="modal">
        <div class="modal-content">
            <h2 style="color:white;">Result?</h2>
            <button onclick="recordScore(50)" style="background:var(--spotify-green); color:white;">BOTH (50)</button>
            <button onclick="recordScore(15)" style="background:var(--spotify-blue); color:white;">ARTIST ONLY (15)</button>
            <button onclick="recordScore(10)" style="background:#9b59b6; color:white;">SONG ONLY (10)</button>
            <button onclick="recordScore(0)" style="background:#e74c3c; color:white;">NONE (0)</button>
        </div>
    </div>

    <script>
        const categories = ["1950s-1970s", "1980s", "1990s", "2000s", "2010s", "2020s", "Host's Choice"];
        const sliceColors = ['#e6194B', '#3cb44b', '#ffe119', '#4363d8', '#f58231', '#911eb4', '#42d4f4'];
        
        // Mode Setup: Alternating 6 slices
        const modeList = ["KARAOKE", "NAME THAT SONG", "KARAOKE", "NAME THAT SONG", "KARAOKE", "NAME THAT SONG"];
        const modeColors = ["#1DB954", "#3498db", "#1DB954", "#3498db", "#1DB954", "#3498db"];

        let team1Name, team2Name, currentTeam = 1, score1 = 0, score2 = 0, turnCount = 0, activeMode = '';
        let countdownInterval, catRotation = 0, modeRotation = 0;
        
        const catCanvas = document.getElementById('wheel-canvas');
        const modeCanvas = document.getElementById('mode-wheel-canvas');

        window.onload = function() {
            createIntroLetters("KARAOKE", "row-1", 0);
            createIntroLetters("ROULETTE", "row-2", 3);
            
            let flashIdx = 0;
            const flashInt = setInterval(() => {
                document.getElementById('flash-categories').innerText = categories[flashIdx % categories.length];
                flashIdx++;
            }, 150);

            setTimeout(() => {
                clearInterval(flashInt);
                document.getElementById('intro-overlay').style.opacity = '0';
                setTimeout(() => { 
                    document.getElementById('intro-overlay').style.display = 'none'; 
                    setupGame(); 
                }, 1000);
            }, 4500);
        };

        function createIntroLetters(text, rowId, offset) {
            const container = document.getElementById(rowId);
            text.split('').forEach((char, i) => {
                const span = document.createElement('span'); 
                span.className = 'block-letter'; 
                span.innerText = char;
                span.style.color = sliceColors[(i + offset) % sliceColors.length];
                span.style.animationDelay = (i * 0.1) + 's'; 
                container.appendChild(span);
            });
        }

        function setupGame() {
            team1Name = prompt("Team 1 Name:", "Team 1") || "Team 1";
            team2Name = prompt("Team 2 Name:", "Team 2") || "Team 2";
            document.getElementById('t1-name').innerText = team1Name.toUpperCase();
            document.getElementById('t2-name').innerText = team2Name.toUpperCase();
            document.getElementById('game-content').style.display = 'flex';
            drawCategoryWheel();
            drawModeWheel();
            updateTurnBanner();
        }

        function drawCategoryWheel() {
            const ctx = catCanvas.getContext('2d');
            const numSlices = categories.length;
            const angle = (Math.PI * 2) / numSlices;
            for (let i = 0; i < numSlices; i++) {
                ctx.beginPath(); ctx.moveTo(400, 400); ctx.arc(400, 400, 390, i * angle, (i + 1) * angle);
                ctx.fillStyle = sliceColors[i]; ctx.fill();
                ctx.save(); ctx.translate(400, 400); ctx.rotate(i * angle + angle/2);
                ctx.textAlign = "right"; ctx.fillStyle = "black"; ctx.font = "bold 45px sans-serif";
                let t = categories[i];
                if (t.includes("-")) {
                    let p = t.split("-"); ctx.fillText(p[0]+"-", 350, -10); ctx.fillText(p[1], 350, 45);
                } else { ctx.fillText(t, 350, 15); }
                ctx.restore();
            }
        }

        function drawModeWheel() {
            const ctx = modeCanvas.getContext('2d');
            const numSlices = 6;
            const angle = (Math.PI * 2) / numSlices;
            for (let i = 0; i < numSlices; i++) {
                ctx.beginPath(); ctx.moveTo(300, 300); ctx.arc(300, 300, 290, i * angle, (i + 1) * angle);
                ctx.fillStyle = modeColors[i]; ctx.fill();
                ctx.save(); ctx.translate(300, 300); ctx.rotate(i * angle + angle/2);
                ctx.textAlign = "right"; ctx.fillStyle = "white"; ctx.font = "bold 35px sans-serif";
                let t = modeList[i];
                if (t === "NAME THAT SONG") {
                    ctx.fillText("NAME THAT", 270, -15); ctx.fillText("SONG", 270, 35);
                } else { ctx.fillText(t, 270, 10); }
                ctx.restore();
            }
        }

        function spinCategory() {
            document.getElementById('spinBtn').style.display = 'none';
            document.getElementById('mode-display').innerText = "SPINNING...";
            const prize = Math.floor(Math.random() * categories.length);
            const stopAt = 360 - (prize * (360/categories.length)) - (180/categories.length);
            catRotation += (360 * 5) + stopAt - (catRotation % 360);
            catCanvas.style.transform = `rotate(${catRotation}deg)`;
            setTimeout(() => { document.getElementById('modeModal').style.display = 'flex'; }, 4500);
        }

        function spinModeWheel() {
            document.getElementById('modeSpinBtn').style.display = 'none';
            const prize = Math.floor(Math.random() * 6);
            const stopAt = 360 - (prize * 60) - 30;
            modeRotation += (360 * 5) + stopAt - (modeRotation % 360);
            modeCanvas.style.transform = `rotate(${modeRotation}deg)`;
            setTimeout(() => { finalizeMode(prize); }, 4500);
        }

        function finalizeMode(idx) {
            activeMode = modeList[idx];
            document.getElementById('modeModal').style.display = 'none';
            document.getElementById('mode-display').innerText = activeMode;
            document.getElementById('mode-display').style.color = modeColors[idx];
            document.getElementById('stopBtn').style.display = 'inline-block';
            startTimer();
        }

        function startTimer() {
            let time = 90;
            clearInterval(countdownInterval);
            countdownInterval = setInterval(() => {
                time--;
                let m = Math.floor(time/60), s = time%60;
                document.getElementById('timer').innerText = `0${m}:${s < 10 ? '0' : ''}${s}`;
                if (time <= 0) triggerScoring();
            }, 1000);
        }

        function triggerScoring() {
            clearInterval(countdownInterval);
            const modal = (activeMode === 'KARAOKE') ? 'spinScoreModal' : 'guessScoreModal';
            document.getElementById(modal).style.display = 'flex';
        }

        function recordScore(pts) {
            if (currentTeam === 1) { score1 += pts; document.getElementById('s1').innerText = score1; currentTeam = 2; }
            else { score2 += pts; document.getElementById('s2').innerText = score2; currentTeam = 1; }
            
            document.querySelectorAll('.modal').forEach(m => m.style.display = 'none');
            document.getElementById('timer').innerText = "01:30";
            document.getElementById('spinBtn').style.display = 'inline-block';
            document.getElementById('modeSpinBtn').style.display = 'block';
            document.getElementById('stopBtn').style.display = 'none';
            document.getElementById('mode-display').innerText = "SPIN TO START";
            document.getElementById('mode-display').style.color = "var(--spotify-blue)";
            
            document.getElementById('t1-box').classList.toggle('active-team');
            document.getElementById('t2-box').classList.toggle('active-team');
            
            turnCount++;
            if (turnCount >= 10) { 
                alert("GAME OVER! WINNER: " + (score1 > score2 ? team1Name : team2Name));
                location.reload(); 
            } else {
                document.getElementById('round-indicator').innerText = `Round ${Math.floor(turnCount/2)+1} of 5`;
                updateTurnBanner();
            }
        }

        function updateTurnBanner() {
            const name = currentTeam === 1 ? team1Name : team2Name;
            document.getElementById('current-team-banner').innerText = `${name.toUpperCase()}'S TURN`;
        }

        function earlyStop() { triggerScoring(); }
    </script>
</body>
</html>
